name: Daily bird report

on:
  # Ingen GitHub-schedule: den är opålitlig och kan köra långt senare samma dag
  # och skriva över dagens avsnitt med ett nytt (icke-deterministiskt) manus.
  # Tiden styrs istället av cron-job.org som anropar workflow_dispatch nedan.
  workflow_dispatch:        # manuell "Run workflow"-knapp + cron-job.org-triggern

permissions:
  contents: write           # låter jobbet committa ny mp3, feed, sida, history

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installera ffmpeg (för att sy ihop de två rösterna)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install requests tzdata

      - name: Generera rapport
        env:
          # --- obligatoriskt ---
          BW_STATION_ID: "28650"   # din PUC (publikt stations-ID, ok i klartext)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: claude-sonnet-4-6   # textmodell som skriver dialogen
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          # --- VÄLJ RÖSTMOTOR: "elevenlabs" (bäst kvalitet) eller "openai" (billig backup) ---
          TTS_PROVIDER: elevenlabs
          # ElevenLabs (v3 text-to-dialogue). Röst-ID sätts som secrets:
          #   ELEVENLABS_VOICE_A = kvinna (Astrid), ELEVENLABS_VOICE_B = man (Erik)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_A: ${{ secrets.ELEVENLABS_VOICE_A }}
          ELEVENLABS_VOICE_B: ${{ secrets.ELEVENLABS_VOICE_B }}
          # Ljud-efterbehandling (pausklippning + normalisering). 0.5 = lite luft
          # mellan replikerna (default i koden är 0.35).
          EL_PAUSE_KEEP: "0.5"
          # OpenAI (backup – används om TTS_PROVIDER sätts till "openai" ovan)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TTS_MODEL: gpt-4o-mini-tts
          OPENAI_VOICE_A: marin   # Astrid
          OPENAI_VOICE_B: cedar   # Erik
        run: python generate_report.py

      - name: Committa och pusha
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ history.json
          git commit -m "Bird report $(date -u +%Y-%m-%d)" || echo "Inget att committa"
          git push
