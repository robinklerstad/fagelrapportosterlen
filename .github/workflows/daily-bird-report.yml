name: Daily bird report

on:
  schedule:
    # GitHub cron is UTC. 04:00 UTC ≈ 06:00 Swedish summer (CEST) / 05:00 winter (CET).
    - cron: "0 4 * * *"
  workflow_dispatch:        # manual "Run workflow" button in the Actions tab

permissions:
  contents: write           # lets the job commit the new mp3, feed, page, history

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg (for stitching the two voices)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - run: pip install requests

      - name: Generate report
        env:
          # --- required ---
          BW_TOKEN: ${{ secrets.BW_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
          # --- TTS: openai (default), two voices ---
          TTS_PROVIDER: openai
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_VOICE_A: nova    # Astrid
          OPENAI_VOICE_B: onyx    # Erik
          # --- to switch to ElevenLabs: set TTS_PROVIDER to "elevenlabs"
          #     and add these three secrets ---
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_A: ${{ secrets.ELEVENLABS_VOICE_A }}
          ELEVENLABS_VOICE_B: ${{ secrets.ELEVENLABS_VOICE_B }}
        run: python generate_report.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ history.json
          git commit -m "Bird report $(date -u +%Y-%m-%d)" || echo "Nothing to commit"
          git push
